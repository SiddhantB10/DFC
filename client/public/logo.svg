<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bgG" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Subtle top glass overlay -->
    <linearGradient id="glG" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="ds" x="-8%" y="-8%" width="120%" height="126%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0d9488" flood-opacity="0.3"/>
    </filter>

    <clipPath id="rc">
      <rect x="20" y="20" width="472" height="472" rx="110"/>
    </clipPath>
  </defs>

  <!-- Shadow container -->
  <g filter="url(#ds)">
    <rect x="20" y="20" width="472" height="472" rx="110" fill="url(#bgG)"/>
  </g>

  <!-- Clipped content -->
  <g clip-path="url(#rc)">
    <!-- Gentle glass overlay -->
    <rect x="20" y="20" width="472" height="472" fill="url(#glG)"/>

    <!-- Dumbbell -->
    <g transform="translate(256, 145)">
      <!-- Left outer plate -->
      <rect x="-130" y="-44" width="30" height="88" rx="10" fill="white" fill-opacity="0.95"/>
      <!-- Left inner plate -->
      <rect x="-100" y="-32" width="20" height="64" rx="7" fill="white" fill-opacity="0.82"/>
      <!-- Bar -->
      <rect x="-80" y="-12" width="160" height="24" rx="12" fill="white" fill-opacity="0.9"/>
      <!-- Right inner plate -->
      <rect x="80" y="-32" width="20" height="64" rx="7" fill="white" fill-opacity="0.82"/>
      <!-- Right outer plate -->
      <rect x="100" y="-44" width="30" height="88" rx="10" fill="white" fill-opacity="0.95"/>
    </g>

    <!-- DFC TEXT -->
    <text x="256" y="322" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-weight="800" font-size="140" fill="white" text-anchor="middle" letter-spacing="6">DFC</text>

    <!-- TAGLINE - reduced spacing to fit -->
    <text x="256" y="385" font-family="'Inter', Arial, sans-serif" font-weight="600" font-size="30" fill="white" fill-opacity="0.75" text-anchor="middle" letter-spacing="4">HEALTH &amp; HARMONY</text>

    <!-- Accent underline -->
    <rect x="150" y="400" width="212" height="2.5" rx="1.25" fill="white" fill-opacity="0.25"/>

    <!-- Sub-tagline -->
    <text x="256" y="438" font-family="'Inter', Arial, sans-serif" font-weight="500" font-size="19" fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="4">YOUR FITNESS PARTNER</text>

    <!-- Subtle inner border -->
    <rect x="22" y="22" width="468" height="468" rx="108" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>
  </g>
</svg>
